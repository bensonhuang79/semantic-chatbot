<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語意相似度聊天機器人</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>語意相似度聊天機器人</h1>
      <p>Embedding + 餘弦相似度</p>
    </header>

    <main class="layout">
      <section class="chat-panel">
        <h2>對話視窗</h2>
        <div id="chatMessages" class="chat-messages">
          <div class="message bot">你好，我是你的語意相似度聊天機器人。</div>
        </div>
      </section>

      <aside class="side-panel">
        <section class="prediction-card">
          <div class="card-header">
            <h2>預判面板</h2>
            <button id="toggleMaskBtn" class="ghost-btn">偷看 / 遮蔽</button>
          </div>
          <div id="predictionList" class="prediction-list">
            <div class="prediction-item masked">＊＊＊ 已遮蔽 ＊＊＊</div>
            <div class="prediction-item masked">＊＊＊ 已遮蔽 ＊＊＊</div>
            <div class="prediction-item masked">＊＊＊ 已遮蔽 ＊＊＊</div>
          </div>
        </section>

        <section class="gauge-card">
          <h2>相似度圓形量表</h2>
          <div class="gauge-wrap">
            <div class="gauge" id="gauge">
              <div class="gauge-inner">
                <span id="gaugeText">0%</span>
              </div>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <footer class="input-bar">
      <input id="userInput" type="text" placeholder="輸入你的訊息..." />
      <button id="sendBtn">送出</button>
    </footer>
  </div>

  <script src="script-v5.js?v=5"></script>
</body>
</html>
